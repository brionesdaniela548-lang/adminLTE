{% extends "base.html" %}

{% block title %}
{{ title }}
{% endblock %}


{% block content %}


<div class="content-wrapper">


    <section class="content-header">

        <div class="container-fluid">

            <h1>
                {{ title }}
            </h1>

        </div>

    </section>



    <section class="content">

        <div class="container-fluid">


            <div class="card card-primary">


                <div class="card-header">

                    <h3 class="card-title">
                        Datos del Producto
                    </h3>

                </div>



                <form method="POST">

                    {% csrf_token %}


                    <div class="card-body">


                        {{ form.as_p }}


                    </div>



                    <div class="card-footer">


                        <button
                            type="submit"
                            class="btn btn-primary">

                            Guardar

                        </button>


                        <a
                            href="{% url 'products' %}"
                            class="btn btn-secondary">

                            Cancelar

                        </a>


                    </div>


                </form>


            </div>


        </div>

    </section>


</div>


{% endblock %}
