{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contraseña actualizada</title>

    <link
        rel="stylesheet"
        href="{% static 'adminlte/plugins/fontawesome-free/css/all.css' %}"
    >

    <link
        rel="stylesheet"
        href="{% static 'adminlte/dist/css/adminlte.css' %}"
    >
</head>

<body class="hold-transition login-page">

<div class="login-box">

    <div class="card">

        <div class="card-body login-card-body text-center">

            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>

            <h4>
                Contraseña actualizada
            </h4>

            <p class="text-muted">

                Tu contraseña fue cambiada correctamente.
                Ya puedes iniciar sesión.

            </p>

            <a
                href="{% url 'login' %}"
                class="btn btn-primary btn-block"
            >
                Iniciar sesión
            </a>

        </div>

    </div>

</div>

<script src="{% static 'adminlte/plugins/jquery/jquery.js' %}"></script>

<script src="{% static 'adminlte/plugins/bootstrap/js/bootstrap.bundle.js' %}"></script>

<script src="{% static 'adminlte/dist/js/adminlte.js' %}"></script>

</body>

</html>
