{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Correo enviado</title>

    <link
        rel="stylesheet"
        href="{% static 'adminlte/plugins/fontawesome-free/css/all.css' %}"
    >

    <link
        rel="stylesheet"
        href="{% static 'adminlte/dist/css/adminlte.css' %}"
    >
</head>

<body class="hold-transition login-page">

<div class="login-box">

    <div class="card">

        <div class="card-body login-card-body text-center">

            <i class="fas fa-envelope-open-text fa-4x text-primary mb-3"></i>

            <h4>
                Revisa tu correo
            </h4>

            <p class="text-muted">

                Si existe una cuenta asociada al correo ingresado,
                recibirás un enlace para restablecer la contraseña.

            </p>

            <p class="text-muted">

                Revisa también la carpeta de correo no deseado.

            </p>

            <a
                href="{% url 'login' %}"
                class="btn btn-primary btn-block"
            >
                Volver al inicio de sesión
            </a>

        </div>

    </div>

</div>

<script src="{% static 'adminlte/plugins/jquery/jquery.js' %}"></script>

<script src="{% static 'adminlte/plugins/bootstrap/js/bootstrap.bundle.js' %}"></script>

<script src="{% static 'adminlte/dist/js/adminlte.js' %}"></script>

</body>

</html>
